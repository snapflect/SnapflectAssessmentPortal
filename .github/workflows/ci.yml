name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./snapflect_backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: sqlite3
        coverage: none
        
    - name: Copy .env
      run: cp .env.example .env
      
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
      
    - name: Create SQLite Database
      run: touch database/database.sqlite
      
    - name: Run Migrations and Seeders
      run: php artisan migrate --seed --force
      
    - name: Run Tests (PHPUnit)
      run: php artisan test

  frontend-test:
    name: Frontend Tests (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./snapflect-frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Tests (Karma)
      run: npx ng test --watch=false --browsers=ChromeHeadless

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
    - uses: actions/checkout@v4
    
    # 1. Setup Backend
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: sqlite3
        
    - name: Setup Backend Environment
      working-directory: ./snapflect_backend
      run: |
        cp .env.example .env
        composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        php artisan key:generate
        touch database/database.sqlite
        php artisan migrate --seed --force
        
    - name: Start Backend
      working-directory: ./snapflect_backend
      run: php artisan serve &
      
    # 2. Setup Frontend & Playwright
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Frontend Dependencies
      working-directory: ./snapflect-frontend
      run: npm ci
      
    - name: Start Frontend
      working-directory: ./snapflect-frontend
      run: npm start &
      
    - name: Wait for services to be ready
      run: |
        npx wait-on http-get://localhost:8000
        npx wait-on http-get://localhost:4200
        
    - name: Install Playwright Browsers
      working-directory: ./snapflect-frontend
      run: npx playwright install --with-deps
      
    - name: Run Playwright Tests
      working-directory: ./snapflect-frontend
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: snapflect-frontend/playwright-report/
        retention-days: 30
